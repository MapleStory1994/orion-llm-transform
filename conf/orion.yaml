runtime:
  num_cpus: 1
  num_runtimes: 1

logging:
  log_level: "info"
  log_directory: "/Users/liuyifeng/Documents/Code/orion-llm-transform/logs"
  log_file: "orion.log"

envoy_bootstrap:
  admin:
    address:
      socket_address:
        address: 127.0.0.1
        port_value: 9901
  static_resources:
    listeners:
      - name: listener_local
        address:
          socket_address: { address: 127.0.0.1, port_value: 10000 }
        filter_chains:
          - filters:
              - name: envoy.filters.network.http_connection_manager
                typedConfig:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                  statPrefix: local
                  codecType: AUTO
                  http_filters:
                    - name: envoy.filters.http.router
                      typedConfig:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                  routeConfig:
                    name: local_route
                    virtual_hosts:
                      - name: local_service
                        domains: ["*"]
                        routes:
                          - match:
                              prefix: "/"
                            direct_response:
                              status: 200
                              body:
                                inline_string: "Hello from Orion Proxy!\n"

      - name: listener_proxy
        address:
          socket_address: { address: 127.0.0.1, port_value: 10001 }
        filter_chains:
          - filters:
              - name: envoy.filters.network.http_connection_manager
                typedConfig:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                  statPrefix: proxy
                  codecType: AUTO
                  http_filters:
                    - name: envoy.filters.http.router
                      typedConfig:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                  routeConfig:
                    name: proxy_route
                    virtual_hosts:
                      - name: backend_service
                        domains: ["*"]
                        routes:
                          - match:
                              prefix: "/"
                            route:
                              cluster: backend_cluster

      - name: listener_ext_proc
        address:
          socket_address: { address: 127.0.0.1, port_value: 10002 }
        filter_chains:
          - filters:
              - name: envoy.filters.network.http_connection_manager
                typedConfig:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                  statPrefix: ext_proc
                  codecType: AUTO
                  http_filters:
                    - name: envoy.filters.http.ext_proc
                      typedConfig:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                        grpcService:
                          envoyGrpc:
                            clusterName: ext_proc_cluster
                        processingMode:
                          requestBodyMode: BUFFERED
                          responseBodyMode: STREAMED
                        failureModeAllow: true
                    - name: envoy.filters.http.router
                      typedConfig:
                        "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                  routeConfig:
                    name: ext_proc_route
                    virtual_hosts:
                      - name: ext_proc_service
                        domains: ["*"]
                        routes:
                          - match:
                              prefix: "/"
                            route:
                              cluster: ext_proc_backend

    clusters:
      - name: backend_cluster
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        load_assignment:
          clusterName: backend_cluster
          endpoints:
            - lbEndpoints:
                - endpoint:
                    address:
                      socketAddress:
                        address: 127.0.0.1
                        portValue: 8080

      - name: ext_proc_cluster
        connect_timeout: 5s
        type: STATIC
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          clusterName: ext_proc_cluster
          endpoints:
            - lbEndpoints:
                - endpoint:
                    address:
                      socketAddress:
                        address: 127.0.0.1
                        portValue: 9001

      - name: ext_proc_backend
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            common_tls_context: {}
            sni: api.deepseek.com
        load_assignment:
          clusterName: ext_proc_backend
          endpoints:
            - lbEndpoints:
                - endpoint:
                    address:
                      socketAddress:
                        address: api.deepseek.com
                        portValue: 443
